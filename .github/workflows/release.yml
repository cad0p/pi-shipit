name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Check for code changes since last tag
        id: changes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only "$LAST_TAG" HEAD | grep -v -E '^(README\.md|CHANGELOG\.md|\.github/|docs/)' || true)
            if [ -n "$CHANGED" ]; then
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Compute hybrid version
        id: version
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          CURRENT=$(jq -r '.version' package.json)
          # Read base SemVer (first 3 segments)
          BASE=$(echo "$CURRENT" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)
          TODAY=$(date -u +%Y%m%d)

          CANDIDATE="$MAJOR.$MINOR.$PATCH.$TODAY"

          if git tag -l "v$CANDIDATE" | grep -q .; then
            SUFFIX=2
            while git tag -l "v$CANDIDATE.$SUFFIX" | grep -q .; do
              SUFFIX=$((SUFFIX + 1))
            done
            VERSION="$CANDIDATE.$SUFFIX"
          else
            VERSION="$CANDIDATE"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"

      - name: Bump version, tag, and release
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"

          jq --indent 2 --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          if git diff --cached --quiet; then
            echo "Version already at $VERSION, skipping commit."
          else
            git commit -m "chore(release): $VERSION [skip ci]"
          fi

          git tag "$TAG"
          git push --atomic origin HEAD:main "$TAG"

          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --latest
